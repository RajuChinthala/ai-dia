services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "80"]
    environment:
      - VITE_PROXY_TARGET=http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
